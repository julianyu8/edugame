<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Word Valley — Lily Pad Pond</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: -apple-system, "Comic Sans MS", "Trebuchet MS", sans-serif;
    color: #5A4632;
  }
  body {
    background-image: url('assets/48ef799a-3165-4cd6-949a-daa822b3a84b.jpeg');
    background-size: cover;
    background-position: center bottom;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  .screen {
    max-width: 900px; margin: 0 auto; min-height: 100vh;
    display: flex; flex-direction: column;
    padding: 18px;
  }
  .view { display: none; flex: 1; flex-direction: column; }
  .view.active { display: flex; }

  /* ---------- shared panels ---------- */
  .panel {
    background: rgba(255,255,255,0.9); border: 4px solid #B5780C; border-radius: 26px;
    box-shadow: 0 5px 0 #e7cda0; padding: 24px;
  }
  .panel-soft {
    background: rgba(255,255,255,0.85); border: 3px solid #B5780C; border-radius: 20px;
    box-shadow: 0 3px 0 #e7cda0; padding: 14px;
  }
  button { font-family: inherit; }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 15px; font-weight: bold; margin-bottom: 10px;
  }
  .map-btn, .pill-btn {
    background: #fff; border: 3px solid #B5780C; border-radius: 14px;
    padding: 8px 16px; font-size: 16px; cursor: pointer;
    box-shadow: 0 3px 0 #e7cda0;
  }
  .level-label {
    font-size: 16px; color: #6b4a14; background: rgba(255,255,255,0.85);
    padding: 8px 16px; border-radius: 14px; border: 3px solid #B5780C;
    box-shadow: 0 3px 0 #e7cda0;
  }

  /* ---------- Fennick prompt ---------- */
  .prompt-box { display:flex; align-items:center; gap:12px; margin: 0 0 18px; }
  .prompt-box img { width: 64px; flex-shrink: 0; }
  .prompt-bubble {
    background:#fff; border:3px solid #B5780C; border-radius:18px;
    padding:14px 20px; font-size:22px; font-weight:bold; flex:1;
    box-shadow: 0 3px 0 #e7cda0;
  }

  /* ---------- word / question card ---------- */
  .card {
    background:#fff; border:4px solid #B5780C; border-radius:26px;
    padding:28px; text-align:center; margin-bottom:22px;
    box-shadow: 0 5px 0 #e7cda0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; min-height: 200px;
  }
  .card img { width:160px; height:160px; object-fit:contain; }
  .card .icon-fallback {
    width:160px; height:160px; display:flex; align-items:center; justify-content:center;
    font-size:80px;
  }
  .card .word { font-size:34px; font-weight:bold; }
  .card .sentence { font-size:28px; font-weight:bold; line-height:1.5; }
  .card .sentence .blank { color:#B5780C; }

  /* ---------- choice buttons (2 or 3 wide) ---------- */
  .choice-row { display:flex; gap:16px; justify-content:center; margin-bottom: 20px; flex-wrap: wrap; }
  .choice {
    flex:1; min-width: 120px; max-width: 240px; cursor:pointer; user-select:none;
    background:#9CDC76; border:4px solid #6FAE4A; border-radius:24px;
    padding:18px 12px; text-align:center; font-size:20px; font-weight:bold; color:#3d5c28;
    transition: transform 0.1s;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap: 8px; min-height: 100px;
    box-shadow: 0 4px 0 #6FAE4A;
  }
  .choice:active { transform: scale(0.96); }
  .choice img { width: 56px; height: 56px; object-fit: contain; }
  .choice .emoji { font-size: 36px; }
  .choice.special { background:#C6EAF7; border-color:#7BBBD6; color:#2b5066; box-shadow: 0 4px 0 #7BBBD6; }
  .choice.alt { background:#FFD9A0; border-color:#E0A23A; color:#7a4f0d; box-shadow: 0 4px 0 #E0A23A; }
  .choice .cap-icon { font-size:28px; line-height:1; }
  .choice.correct { background:#FFC857; border-color:#B5780C; color:#6b4a14; box-shadow: 0 4px 0 #B5780C; }
  .choice.wrong { animation: wobble 0.4s; }
  .classify-btn { font-size:28px; padding:24px 16px; max-width:100%; }

  /* ---------- candy jar exercise ---------- */
  .gb-key { display:flex; gap:14px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  .gb-swatch {
    display:flex; align-items:center; gap:10px; padding:12px 24px;
    border-radius:20px; border:4px solid rgba(0,0,0,0.12);
    font-size:20px; font-weight:bold; color:#3a2a00;
    cursor:pointer; transition:transform 0.1s, box-shadow 0.15s;
    user-select:none;
  }
  .gb-swatch:hover { transform:scale(1.05); }
  .gb-swatch.active { box-shadow:0 0 0 5px #3a2a00; transform:scale(1.08); }

  /* Candy jar exercise */
  .gb-jar-wrap { position:relative; width:100%; max-width:820px; margin:0 auto 14px; }
  .gb-jar-svg  { width:100%; display:block; pointer-events:none; user-select:none; }
  .gb-jar {
    position:absolute; top:20%; left:13%; right:13%; bottom:10%;
    display:flex; flex-wrap:wrap;
    justify-content:center;
    align-content:flex-end;
    gap:0; padding:0 4px 4px;
    overflow:hidden;
  }
  .gb-jar.brush-ready .gb-bubble {
    cursor:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36'><text y='30' font-size='28'>🖌️</text></svg>") 4 32, crosshair;
  }
  .gb-bubble {
    border-radius:50%; display:flex; align-items:center; justify-content:center;
    text-align:center; font-weight:bold;
    color:#3a2a00; border:3px solid #C8B89A; background:#f5f0e8;
    transition:background 0.2s, border-color 0.2s;
    user-select:none; padding:8px; line-height:1.2; flex-shrink:0;
  }
  .gb-bubble.wrong-flash { animation:wobble 0.4s; }

  /* ---------- word cloud exercise ---------- */
  .wc-palette-row { display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:14px; flex-wrap:wrap; }
  .wc-palette-label { font-size:18px; font-weight:bold; color:#5A4632; }
  .wc-pen {
    width:38px; height:38px; border-radius:50%; border:4px solid transparent;
    cursor:pointer; transition:transform 0.1s, border-color 0.15s;
  }
  .wc-pen:hover { transform:scale(1.15); }
  .wc-pen.selected { border-color:#3a2a00; transform:scale(1.2); }
  .wc-box {
    background:#fff; border:3px solid #C8B89A; border-radius:18px;
    padding:24px 28px; margin-bottom:16px; min-height:340px;
    display:flex; flex-wrap:wrap; justify-content:center; align-items:center;
    width:100%;
  }
  .wc-word {
    font-weight:bold; cursor:pointer; user-select:none;
    padding:4px 8px; border-radius:6px;
    color:#3a2a00; transition:background 0.15s;
    border:none; background:transparent;
  }
  .wc-word:active { opacity:0.75; }
  .wc-word.highlighted { border-radius:6px; }
  .wc-word.wrong-flash { animation:wobble 0.4s; background:#EF9A9A !important; }
  @keyframes wobble {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px) rotate(-3deg); }
    75% { transform: translateX(6px) rotate(3deg); }
  }

  /* ---------- capital-hunt word chips ---------- */
  .word-chips { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .chip {
    background:#FFF6E5; border: 3px solid #E0A23A; border-radius:14px;
    padding:10px 16px; font-size:26px; font-weight:bold; cursor:pointer;
    user-select:none; transition: transform 0.1s;
  }
  .chip:active { transform: scale(0.95); }
  .chip.target.done { background:#FFC857; border-color:#B5780C; color:#6b4a14; }
  .chip.wobble { animation: wobble 0.4s; }
  .chip.static { background: transparent; border-color: transparent; cursor: default; padding: 10px 4px; }

  /* ---------- feedback ---------- */
  .feedback {
    text-align:center; font-size:26px; font-weight:bold; min-height: 36px;
    margin-bottom: 10px; text-shadow: 0 1px 0 #fff;
  }
  .feedback.good { color:#5f9b3a; }
  .feedback.try { color:#c97b2e; }

  /* ---------- fun fact ---------- */
  .funfact {
    background:#FFF6E5; border:3px dashed #FFC857; border-radius:18px;
    padding:14px 18px; text-align:center; font-size:19px; margin-bottom:12px;
    display:none; box-shadow: 0 3px 0 #f0dcb8;
  }
  .funfact.show { display:block; }

  /* ---------- progress track ---------- */
  .q-track-wrap { display:flex; justify-content:center; padding: 6px 0 10px; }
  .q-track { display:flex; align-items:center; justify-content:center; gap: 6px; flex-wrap: wrap; }
  .pad-dot {
    width: 36px; height: 14px; border-radius: 8px;
    background:#D9D0C0; border: none;
  }
  .pad-dot.done    { background:#FFC857; }
  .pad-dot.current { background:#B5780C; }

  /* ---------- MAP SCREEN ---------- */
  .map-title {
    text-align:center; font-size:30px; font-weight:bold; margin: 4px 0 16px;
    color:#5A4632; text-shadow: 0 2px 0 #fff8ec, 0 0 6px #fff;
  }
  .map-fennick-row { display:flex; align-items:flex-end; gap: 14px; margin-bottom: 16px; }
  .map-fennick-row img.fennick { width: 90px; }
  .map-fennick-row img.frog { width: 64px; }
  .map-speech {
    background:#fff; border:3px solid #B5780C; border-radius:16px;
    padding:12px 16px; font-size:18px; line-height:1.4; flex:1;
    box-shadow: 0 3px 0 #e7cda0;
  }
  .level-grid { display:flex; flex-direction:column; gap: 14px; flex: 1; }
  .level-card {
    background: rgba(255,255,255,0.92); border:4px solid #B5780C; border-radius:22px;
    padding:22px 26px; display:flex; align-items:center; justify-content:space-between;
    cursor:pointer; box-shadow: 0 5px 0 #e7cda0; transition: transform 0.08s;
    flex: 1; /* cards share all remaining vertical space equally */
  }
  .level-card:active { transform: scale(0.98); }
  .level-card .lname { font-size:22px; font-weight:bold; }
  .level-card .lsub { font-size:15px; color:#9b8568; margin-top:4px; }
  .level-card .lstatus { font-size: 36px; }
  .level-card.done { border-color:#6FAE4A; }
  .sublevel-btn {
    display: flex; align-items: center; gap: 12px;
    background: #FFF6E5; border: 2px solid #E0A23A; border-radius: 16px;
    padding: 14px 16px; cursor: pointer; margin-top: 8px;
    transition: background 0.1s; box-shadow: 0 3px 0 #c8882a;
    flex: 1;
  }
  .sublevel-btn:active { transform: scale(0.97); }
  .sub-label { font-size: 17px; font-weight: bold; color: #5A4632; flex: 1; }
  .sub-sub   { font-size: 13px; color: #9b8568; flex: 2; }
  .sub-arrow { font-size: 22px; }

  /* ---------- chapter end ---------- */
  .celebrate {
    text-align:center; padding: 40px 24px; margin-top: auto; margin-bottom: auto;
    background: rgba(255,255,255,0.92); border: 4px solid #B5780C; border-radius: 26px;
    box-shadow: 0 5px 0 #e7cda0;
  }
  .celebrate img { width: 140px; }
  .celebrate h2 { font-size: 32px; }
  .celebrate p { font-size: 20px; }
  .celebrate-btn {
    background:#FFC857; border:4px solid #B5780C; border-radius:18px;
    padding:14px 28px; font-size:22px; font-weight:bold; color:#6b4a14;
    cursor:pointer; margin-top: 14px; box-shadow: 0 4px 0 #B5780C;
  }
  .stars { font-size: 40px; margin: 10px 0; }

  /* ---------- drag-drop noun sort ---------- */
  .noun-bank {
    display: flex; flex-wrap: wrap; gap: 14px; justify-content: center; align-content: flex-start;
    padding: 16px; background: rgba(255,255,255,0.9); border: 3px solid #B5780C;
    border-radius: 20px; margin-bottom: 16px;
    box-shadow: 0 3px 0 #e7cda0;
  }
  .noun-bank-empty {
    color: #6FAE4A; font-weight: bold; font-size: 22px;
    display: flex; align-items: center; justify-content: center; width: 100%;
    padding: 20px 0;
  }
  .noun-card {
    width: 114px; cursor: grab; background: #fff; border: 3px solid #B5780C;
    border-radius: 14px; overflow: hidden; box-shadow: 0 3px 0 #e7cda0;
    user-select: none; touch-action: none; text-align: center;
  }
  .noun-card img { width: 114px; height: 100px; object-fit: contain; display: block; background: #fff; }
  .noun-card .noun-label {
    font-size: 18px; font-weight: bold; color: #5A4632;
    padding: 6px 4px 8px; text-transform: capitalize;
  }
  .noun-card.dragging { opacity: 0.35; }
  .drag-columns { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 8px; }
  .drag-col {
    border: 3px dashed #B5780C; border-radius: 16px;
    background: rgba(255,255,255,0.75);
    min-height: 500px;
    display: flex; flex-direction: column; align-items: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .drag-col.drag-over { background: #FFF6E5; border-color: #FFC857; border-style: solid; }
  .drag-col.col-done { background: #e8f8d8; border-color: #6FAE4A; border-style: solid; }
  .col-header {
    font-size: 16px; font-weight: bold; color: #5A4632; padding: 10px 6px 8px;
    text-align: center; border-bottom: 2px solid #e7cda0; width: 100%;
  }
  .col-icon { font-size: 28px; line-height: 1.3; }
  .col-cards { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 10px; align-content: flex-start; flex: 1; }
  .col-card { width: 114px; border: 2px solid #6FAE4A; border-radius: 12px; overflow: hidden; background: #fff; text-align: center; }
  .col-card img { width: 114px; height: 100px; object-fit: contain; display: block; background: #fff; }
  .col-card .noun-label { font-size: 17px; font-weight: bold; color: #5A4632; padding: 5px 4px 7px; text-transform: capitalize; }

  /* ---------- result screen ---------- */
  .result-wrap { display:flex; flex-direction:column; align-items:center; flex:1; gap:14px; }
  .result-img-wrap { position:relative; width:100%; }
  .result-img { width:100%; border-radius:20px; display:block; }
  .trophy-overlay {
    position:absolute; top:2%; left:19%; width:28%; text-align:center;
    font-size:58px; font-weight:900; color:#7a4f00;
    text-shadow: 3px 3px 0 #fff,-3px -3px 0 #fff,3px -3px 0 #fff,-3px 3px 0 #fff,0 0 14px #fff8;
    pointer-events:none; line-height:1.1;
  }
  .result-score-box {
    background:rgba(255,255,255,0.95); border:4px solid #B5780C; border-radius:20px;
    padding:18px 28px; text-align:center; width:100%; box-shadow:0 4px 0 #e7cda0;
  }
  .rscore-line { font-size:22px; color:#5A4632; margin:5px 0; }
  .rscore-total { font-size:34px; font-weight:900; color:#B5780C; margin-top:12px; border-top:2px dashed #e7cda0; padding-top:10px; }

  /* ---------- tap-the-noun exercise ---------- */
  .tn-sentence {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center;
    align-items: center; padding: 10px 0;
  }
  .tn-word {
    font-size: 32px; font-weight: bold; cursor: pointer; user-select: none;
    background: #FFF6E5; border: 3px solid #E0A23A; border-radius: 16px;
    padding: 12px 20px; color: #5A4632; box-shadow: 0 4px 0 #c8882a;
    transition: transform 0.08s;
  }
  .tn-word:active { transform: scale(0.94); }
  .tn-punct { font-size: 32px; font-weight: bold; color: #5A4632; }
  .tn-word.tn-correct { background: #FFC857; border-color: #B5780C; color: #6b4a14; box-shadow: 0 4px 0 #8a5a0a; }
  .tn-word.tn-wrong { animation: wobble 0.4s; background: #ffd5d5; border-color: #c0392b; }

  /* ---------- word search exercise ---------- */
  .ws-fruits {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    padding: 10px 0 14px;
  }
  .ws-fruit-item {
    position: relative; width: 115px; height: 115px;
    display: flex; align-items: center; justify-content: center;
  }
  .ws-fruit-item img {
    width: 115px; height: 115px; object-fit: contain;
    transition: opacity 0.3s;
  }
  .ws-fruit-item.found img { opacity: 0.35; }
  .ws-fruit-item .ws-check {
    display: none; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 48px; line-height: 1;
  }
  .ws-fruit-item.found .ws-check { display: block; }
  .ws-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 3px;
    width: 100%;
    user-select: none;
  }
  .ws-cell {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(16px, 4.5vw, 34px);
    font-weight: 900;
    color: #3a2a00;
    background: #FFF6E5;
    border: 2px solid #E0C870;
    border-radius: 6px;
    cursor: pointer;
    touch-action: none;
    transition: background 0.12s;
  }
  .ws-cell.selecting { background: #FFE082; border-color: #F9A825; color: #3a2a00; }
  .ws-cell.found    { background: #A5D6A7; border-color: #43A047; color: #1b5e20; }
  .ws-cell.wrong    { background: #EF9A9A; border-color: #e53935; }

  /* ---------- fill-in-blank exercise ---------- */
  .fib-bank {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    padding: 10px 0 18px;
  }
  .fib-chip {
    font-size: 32px; font-weight: bold; padding: 12px 26px;
    background: #FFF6E5; border: 3px solid #E0A23A; border-radius: 16px;
    color: #5A4632; box-shadow: 0 4px 0 #c8882a;
    transition: all 0.3s;
  }
  .fib-chip.used {
    text-decoration: line-through; opacity: 0.45;
    box-shadow: none; border-color: #ccc; background: #f0ece4;
  }
  .fib-questions { display: flex; flex-direction: column; gap: 14px; width: 100%; }
  .fib-row {
    display: flex; align-items: center; flex-wrap: wrap; gap: 8px;
    background: #FFF6E5; border: 3px solid #E0C870; border-radius: 18px;
    padding: 14px 18px; font-size: 26px; font-weight: bold; color: #3a2a00;
    transition: background 0.3s, border-color 0.3s;
  }
  .fib-row.correct { background: #C8E6C9; border-color: #43A047; }
  .fib-input {
    font-size: 26px; font-weight: bold; font-family: inherit;
    width: 190px; border: none; border-bottom: 4px solid #E0A23A;
    background: transparent; outline: none; color: #3a2a00;
    text-align: center; padding: 2px 6px;
  }
  .fib-input:disabled { color: #2e7d32; border-color: #43A047; }

  /* ---------- tutorial (teaching) screen ---------- */
  .tut-wrap { display:flex; flex-direction:column; gap:14px; }
  .tut-section {
    border-radius:22px; padding:18px 22px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }
  .tut-heading {
    font-size:21px; font-weight:bold; margin-bottom:8px;
    display:flex; align-items:center; gap:8px;
  }
  .tut-body { font-size:18px; line-height:1.5; margin-bottom:12px; }
  .tut-examples { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .tut-ex {
    display:flex; align-items:center; gap:8px;
    background:rgba(255,255,255,0.75); border-radius:12px;
    padding:8px 14px; font-size:19px; font-weight:bold;
  }
  .tut-arrow { color:#B5780C; font-size:18px; }
  .tut-s { color:#B5780C; font-weight:900; }

  /* ---------- plural table exercise ---------- */
  .plural-rule-badge {
    background:#FFF6E5; border:3px solid #E0A23A; border-radius:16px;
    padding:11px 18px; font-size:20px; font-weight:bold; color:#5A4632;
    text-align:center; margin-bottom:12px; box-shadow:0 3px 0 #c8882a;
  }
  .plural-table { display:flex; flex-direction:column; gap:9px; width:100%; }
  .plural-row {
    display:flex; align-items:center; gap:10px;
    background:#FFF6E5; border:3px solid #E0C870; border-radius:16px;
    padding:9px 14px; transition:background 0.3s, border-color 0.3s;
  }
  .plural-row.correct { background:#C8E6C9; border-color:#43A047; }
  .plural-emoji { font-size:28px; width:38px; text-align:center; flex-shrink:0; }
  .plural-singular {
    font-size:22px; font-weight:bold; color:#3a2a00;
    min-width:110px; flex-shrink:0;
  }
  .plural-arrow-cell { font-size:20px; color:#B5780C; flex-shrink:0; }
  .plural-input {
    font-size:22px; font-weight:bold; font-family:inherit;
    flex:1; min-width:100px;
    border:none; border-bottom:4px solid #E0A23A;
    background:transparent; outline:none; color:#3a2a00; padding:2px 6px;
  }
  .plural-input:disabled { color:#2e7d32; border-color:#43A047; }

  /* ---------- days-of-week: drag to order ---------- */
  .day-chip-bank {
    display:flex; flex-wrap:wrap; gap:12px; justify-content:center;
    padding:16px; background:rgba(255,255,255,0.9); border:3px solid #B5780C;
    border-radius:20px; margin-bottom:16px; box-shadow:0 3px 0 #e7cda0;
  }
  .day-chip {
    cursor:grab; background:#fff; border:3px solid #B5780C; border-radius:14px;
    padding:14px 20px; font-size:20px; font-weight:bold; color:#5A4632;
    box-shadow:0 3px 0 #e7cda0; user-select:none; touch-action:none;
  }
  .day-chip.dragging { opacity:0.35; }
  .day-slots { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:8px; }
  .day-slot {

/* =========================================================
   LEVEL ENGINE
   ========================================================= */
function startLevel(levelIndex, startIdx = 0) {
  exerciseScores = [];
  wrongCount = 0;
  currentLevel = levelIndex;
  currentIdx = startIdx;
  document.getElementById('view-map').classList.remove('active');
  document.getElementById('view-chapterend').classList.remove('active');
  document.getElementById('view-level').classList.add('active');
  document.getElementById('levelLabel').textContent = `Level ${levelIndex+1} — ${LEVELS[levelIndex].title}`;
  document.getElementById('prompt').textContent = LEVELS[levelIndex].prompt;
  renderQuestion();
}

function renderTrack() {
  const data = LEVELS[currentLevel].data;
  const q = data[currentIdx];
  const wrap = document.getElementById('qTrackWrap');
  const track = document.getElementById('track');
  track.innerHTML = '';

  // Only show tracker for per-page question types
  const perPageTypes = ['classify','fillgap','sort','capital','pluralchoice','countchoice','clockread'];
  if (!q || !perPageTypes.includes(q.type)) {
    wrap.style.display = 'none';
    return;
  }
  wrap.style.display = 'flex';

  const { start, end } = getExerciseBounds();
  for (let i = start; i <= end; i++) {
    const dot = document.createElement('div');
    dot.className = 'pad-dot' + (i < currentIdx ? ' done' : (i === currentIdx ? ' current' : ''));
    track.appendChild(dot);
  }
}

function clearFeedback() {
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('funfact').className = 'funfact';
  document.getElementById('funfact').innerHTML = '';
}

function showFact(fact) {
  if (!fact) return;
  const ff = document.getElementById('funfact');
  ff.classList.add('show');
  ff.textContent = fact;
}

/* Returns the current exercise entry and its question bounds */
function getExerciseBounds() {
  const lvl = LEVELS[currentLevel];
  const data = lvl.data;
  if (!lvl.exercises) return { ex:null, start:0, end:data.length-1, total:data.length, nextEx:null };
  const ex = [...lvl.exercises].reverse().find(e => e.startIdx <= currentIdx) || lvl.exercises[0];
  const exIdx = lvl.exercises.indexOf(ex);
  const nextEx = lvl.exercises[exIdx + 1] || null;
  const end = nextEx ? nextEx.startIdx - 1 : data.length - 1;
  return { ex, exIdx, start:ex.startIdx, end, total: end - ex.startIdx + 1, nextEx };
}

function renderQuestion() {
  clearFeedback();
  renderTrack();
  const lvl = LEVELS[currentLevel];
  const q = lvl.data[currentIdx];
  const c = document.getElementById('qcontainer');
  c.innerHTML = '';

  // Update level + exercise label in topbar
  const { ex } = getExerciseBounds();
  const exPart = ex ? ` · ${ex.label}` : '';
  document.getElementById('levelLabel').textContent = `Level ${currentLevel+1} — ${lvl.title}${exPart}`;

  // update prompt per question type
  const promptOverrides = { drag:'Sort the nouns into four groups!', tapnounall:'Tap the noun in each sentence!', wordsearch:'Find the fruit words hidden in the grid!', fillinblank:'Fill in the blank with the correct word!', wordcloud:'Choose a favourite colour and colour all the proper nouns!', gumball:'Pick a colour from the key, then paint each candy!', tutorial:'Read the rules, then click "Got it!" to start!', pluraltable:'Type the plural form of each word!', pluralchoice:'Pick the correct plural!', countchoice:'Pick the right word!', clockread:'What time does the clock show?', dayorder:'Drag each day into the right order!', dayblank:'Fill in the missing letters!', jumble:'Unscramble the letters to spell the word!', phonetic:'Pick the word that matches the sound!' };
  document.getElementById('prompt').textContent = promptOverrides[q.type] || lvl.prompt;

  if (q.type === 'drag') renderDrag(q, c);
  else if (q.type === 'tapnounall') renderTapnounAll(q, c);
  else if (q.type === 'wordsearch') renderWordsearch(q, c);
  else if (q.type === 'fillinblank') renderFillinBlank(q, c);
  else if (q.type === 'wordcloud') renderWordcloud(q, c);
  else if (q.type === 'gumball') renderGumball(q, c);
  else if (q.type === 'tutorial') renderTutorial(q, c);
  else if (q.type === 'pluralchoice') renderPluralChoice(q, c);
  else if (q.type === 'countchoice')  renderCountChoice(q, c);
  else if (q.type === 'pluraltable') renderPluralTable(q, c);
  else if (q.type === 'classify') renderClassify(q, c);
  else if (q.type === 'fillgap') renderFillgap(q, c);
  else if (q.type === 'sort') renderSort(q, c);
  else if (q.type === 'capital') renderCapital(q, c);
  else if (q.type === 'clockread') renderClockRead(q, c);
  else if (q.type === 'dayorder') renderDayOrder(q, c);
  else if (q.type === 'dayblank') renderDayBlank(q, c);
  else if (q.type === 'jumble') renderJumble(q, c);
  else if (q.type === 'phonetic') renderPhonetic(q, c);
}

/* ---- Type 0: drag nouns to category ---- */
function renderDrag(q, c) {
  wrongCount = 0; // reset for this exercise
  const CATS = [
    { key:'people',  label:'People',  icon:'🧑' },
    { key:'animals', label:'Animals', icon:'🐾' },
    { key:'things',  label:'Things',  icon:'📦' },
    { key:'places',  label:'Places',  icon:'📍' },
  ];
  const placed = {}; // word → cat key
  let dragWord = null;

  function rebuild() {
    c.innerHTML = '';

    // ---- bank ----
    const bank = document.createElement('div');
    bank.className = 'noun-bank';
    const remaining = q.nouns.filter(n => !placed[n.word]);
    if (remaining.length === 0) {
      bank.innerHTML = '<div class="noun-bank-empty">All sorted! 🎉</div>';
    } else {
      remaining.forEach(n => {
        const card = document.createElement('div');
        card.className = 'noun-card';
        card.draggable = true;
        card.dataset.word = n.word;
        card.innerHTML = `<img src="${n.img}" alt="${n.word}"><div class="noun-label">${n.word}</div>`;

        card.addEventListener('dragstart', e => {
          dragWord = n.word;
          setTimeout(() => card.classList.add('dragging'), 0);
          e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', () => {
          card.classList.remove('dragging');
          dragWord = null;
        });
        bank.appendChild(card);
      });
    }
    c.appendChild(bank);

    // ---- 4-column grid ----
    const grid = document.createElement('div');
    grid.className = 'drag-columns';

    CATS.forEach(cat => {
      const col = document.createElement('div');
      col.className = 'drag-col';
      col.dataset.cat = cat.key;

      const inCat = q.nouns.filter(n => placed[n.word] === cat.key);
      if (inCat.length > 0) col.classList.add('col-done');

      const colCards = inCat.map(n =>
        `<div class="col-card"><img src="${n.img}" alt="${n.word}"><div class="noun-label">${n.word}</div></div>`
      ).join('');

      col.innerHTML = `
        <div class="col-header"><div class="col-icon">${cat.icon}</div>${cat.label}</div>
        <div class="col-cards">${colCards}</div>
      `;

      col.addEventListener('dragover', e => {
        e.preventDefault();
        col.classList.add('drag-over');
      });
      col.addEventListener('dragleave', e => {
        if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
      });
      col.addEventListener('drop', e => {
        e.preventDefault();
        col.classList.remove('drag-over');
        if (!dragWord) return;
        const noun = q.nouns.find(n => n.word === dragWord);
        if (noun.cat === cat.key) {
          placed[dragWord] = cat.key;
          dragWord = null;
          rebuild();
          if (Object.keys(placed).length === q.nouns.length) {
            playPraise();
            const fb = document.getElementById('feedback');
            fb.textContent = 'Amazing! You sorted them all! 🎉';
            fb.className = 'feedback good';
            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Next ➜';
            nextBtn.style.cssText = `display:block;margin:16px auto 0;background:#FFC857;border:4px solid #B5780C;border-radius:18px;padding:14px 36px;font-size:22px;font-weight:bold;color:#6b4a14;cursor:pointer;box-shadow:0 4px 0 #B5780C;font-family:inherit;`;
            nextBtn.onclick = () => finishExercise('Exercise 1 — Sort It!', q.nouns.length, advance);
            document.getElementById('qcontainer').appendChild(nextBtn);
          }
        } else {
          wrongCount++;
          const fb = document.getElementById('feedback');
          fb.textContent = 'Try another group! 🌱';
          fb.className = 'feedback try';
          col.style.animation = 'wobble 0.4s';
          setTimeout(() => { col.style.animation = ''; }, 400);
          dragWord = null;
        }
      });

      grid.appendChild(col);
    });

    c.appendChild(grid);
  }

  rebuild();
}

              nextBtn.onclick = () => finishExercise('Exercise 2 — Find the Noun', q.questions.length, advance);

/* ---- Type 0c: word search ---- */
function renderWordsearch(q, c) {
  // track which answer cells are permanently found
  const foundCells = new Set(); // "row,col"
  const foundWords = new Set(); // word string
  let dragStartCell = null;
  let isDragging = false;
  let previewCells = [];

  // --- fruit images row ---
  const fruitRow = document.createElement('div');
  fruitRow.className = 'ws-fruits';
  q.fruits.forEach(f => {
    const item = document.createElement('div');
    item.className = 'ws-fruit-item';
    item.id = 'ws-fruit-' + f.word;
    const img = document.createElement('img');
    img.src = f.img;
    img.alt = '';
    const check = document.createElement('span');
    check.className = 'ws-check';
    check.textContent = '✅';
    item.appendChild(img);
    item.appendChild(check);
    fruitRow.appendChild(item);
  });
  c.appendChild(fruitRow);

  // --- grid ---
  const grid = document.createElement('div');
  grid.className = 'ws-grid';
  grid.id = 'ws-grid';

  q.grid.forEach((row, r) => {
    row.forEach((letter, col) => {
      const cell = document.createElement('div');
      cell.className = 'ws-cell';
      cell.textContent = letter;
      cell.dataset.r = r;
      cell.dataset.c = col;
      grid.appendChild(cell);
    });
  });
  c.appendChild(grid);

  // --- feedback line ---
  const fb = document.getElementById('feedback');

  // --- helper: get all cells between two points (horizontal only) ---
  function getCellsBetween(r1, c1, r2, c2) {
    if (r1 !== r2) return []; // only horizontal supported
    const cells = [];
    const step = c2 >= c1 ? 1 : -1;
    for (let col = c1; col !== c2 + step; col += step) {
      cells.push([r1, col]);
    }
    return cells;
  }

  function cellEl(r, col) {
    return grid.querySelector(`.ws-cell[data-r="${r}"][data-c="${col}"]`);
  }

  function clearPreview() {
    previewCells.forEach(([r, col]) => {
      const el = cellEl(r, col);
      if (el && !foundCells.has(r + ',' + col)) el.classList.remove('selecting');
    });
    previewCells = [];
  }

  function setPreview(cells) {
    clearPreview();
    previewCells = cells;
    cells.forEach(([r, col]) => {
      const el = cellEl(r, col);
      if (el && !foundCells.has(r + ',' + col)) el.classList.add('selecting');
    });
  }

  function flashWrong(cells) {
    cells.forEach(([r, col]) => {
      const el = cellEl(r, col);
      if (el) { el.classList.add('wrong'); el.classList.remove('selecting'); }
    });
    setTimeout(() => {
      cells.forEach(([r, col]) => {
        const el = cellEl(r, col);
        if (el && !foundCells.has(r + ',' + col)) el.classList.remove('wrong');
      });
    }, 500);
  }

  function checkAndMark(cells) {
    // build word from cells
    const word = cells.map(([r, col]) => q.grid[r][col]).join('');
    // check against answers (also try reverse)
    const matched = q.answers.find(a => {
      const aCells = a.cells.map(([r, col]) => r + ',' + col).join('|');
      const sCells = cells.map(([r, col]) => r + ',' + col).join('|');
      const sCellsRev = [...cells].reverse().map(([r, col]) => r + ',' + col).join('|');
      return aCells === sCells || aCells === sCellsRev;
    });

    if (matched && !foundWords.has(matched.word)) {
      // mark found
      matched.cells.forEach(([r, col]) => {
        foundCells.add(r + ',' + col);
        const el = cellEl(r, col);
        if (el) { el.classList.remove('selecting', 'wrong'); el.classList.add('found'); }
      });
      foundWords.add(matched.word);

      // mark fruit image
      const fi = document.getElementById('ws-fruit-' + matched.word);
      if (fi) fi.classList.add('found');

      // praise
      playPraise();
      fb.textContent = '🎉 ' + matched.word.charAt(0) + matched.word.slice(1).toLowerCase() + '! Great find!';
      fb.className = 'feedback good';

      // check if all done
      if (foundWords.size === q.fruits.length) {
        fb.textContent = '🎉 You found all the fruits! Amazing!';
        const nextBtn = document.createElement('button');
        nextBtn.textContent = 'Next ➜';
        nextBtn.style.cssText = `display:block;margin:16px auto 0;background:#FFC857;border:4px solid #B5780C;border-radius:18px;padding:14px 36px;font-size:22px;font-weight:bold;color:#6b4a14;cursor:pointer;box-shadow:0 4px 0 #B5780C;font-family:inherit;`;
        nextBtn.onclick = () => finishExercise('Exercise 3 — Word Search', q.fruits.length, advance);
        c.appendChild(nextBtn);
      }
    } else if (!matched || foundWords.has(matched?.word)) {
      flashWrong(cells);
      fb.textContent = 'Keep looking! 🔍';
      fb.className = 'feedback try';
    }
  }

  // --- pointer events for drag selection ---
  function getCell(e) {
    const el = document.elementFromPoint(e.clientX, e.clientY);
    return el?.closest?.('.ws-cell');
  }

  grid.addEventListener('pointerdown', e => {
    const cell = getCell(e);
    if (!cell) return;
    e.preventDefault();
    grid.setPointerCapture(e.pointerId);
    isDragging = true;
    dragStartCell = { r: parseInt(cell.dataset.r), c: parseInt(cell.dataset.c) };
    setPreview([[dragStartCell.r, dragStartCell.c]]);
  });

  grid.addEventListener('pointermove', e => {
    if (!isDragging || !dragStartCell) return;
    const cell = getCell(e);
    if (!cell) return;
    const endR = parseInt(cell.dataset.r);
    const endC = parseInt(cell.dataset.c);
    const cells = getCellsBetween(dragStartCell.r, dragStartCell.c, endR, endC);
    if (cells.length > 0) setPreview(cells);
  });

  grid.addEventListener('pointerup', e => {
    if (!isDragging || !dragStartCell) return;
    isDragging = false;
    const cell = getCell(e);
    if (cell) {
      const endR = parseInt(cell.dataset.r);
      const endC = parseInt(cell.dataset.c);
      const cells = getCellsBetween(dragStartCell.r, dragStartCell.c, endR, endC);
      clearPreview();
      if (cells.length >= 3) {
        checkAndMark(cells);
      }
    } else {
      clearPreview();
    }
    dragStartCell = null;
  });

  grid.addEventListener('pointercancel', () => {
    isDragging = false;
    dragStartCell = null;
    clearPreview();
  });
}

/* ---- Type 0d: fill in the blank ---- */
function renderFillinBlank(q, c) {
  wrongCount = 0;
  let solvedCount = 0;

  // Word bank row
  const bank = document.createElement('div');
  bank.className = 'fib-bank';
  q.bank.forEach(word => {
    const chip = document.createElement('div');
    chip.className = 'fib-chip';
    chip.textContent = word;
    chip.id = 'fib-chip-' + word;
    bank.appendChild(chip);

    row.className = 'fib-row';

    beforeSpan.textContent = qItem.before;

/* ---- Type 0b: tap the noun (single, unused) ---- */
function renderTapnoun(q, c) {
  const parts = q.sentence.map((w, i) => {
    const isPunct = /^[.!?,]$/.test(w);
    return isPunct
      ? `<span class="tn-punct">${w}</span>`
      : `<div class="tn-word" id="tnw${i}">${w}</div>`;
  }).join('');

  c.innerHTML = `<div class="card" style="min-height:160px;"><div class="tn-sentence">${parts}</div></div>`;

  q.sentence.forEach((w, i) => {
    if (/^[.!?,]$/.test(w)) return;
    document.getElementById(`tnw${i}`).onclick = function() {
      if (w.toLowerCase() === q.noun.toLowerCase()) {
        this.classList.add('tn-correct');
        // disable all other words
        q.sentence.forEach((_, j) => {
          const el = document.getElementById(`tnw${j}`);

  const showCorrectFirst = Math.random() < 0.5;

  const optB = showCorrectFirst ? q.wrong   : q.correct;

  const art = q.img
    ? `<img src="${q.img}" alt="${q.singular}" style="width:130px;height:130px;object-fit:contain;">`
    : `<div class="icon-fallback" style="font-size:90px;width:auto;height:auto;">${q.emoji}</div>`;

    </div>
    <div class="choice-row" style="margin-top:8px;">
      <div class="choice" id="pcA" style="font-size:26px;min-height:80px;">${optA}</div>
      <div class="choice" id="pcB" style="font-size:26px;min-height:80px;">${optB}</div>
    </div>
  `;

  function pick(chosen, btnEl) {
    const correct = (chosen === q.correct);

  document.getElementById('pcA').onclick = () => pick(optA, document.getElementById('pcA'));
  document.getElementById('pcB').onclick = () => pick(optB, document.getElementById('pcB'));
}

        fb.textContent = 'Not quite — try again! 🌱';

    checkBtn.addEventListener('click', checkAnswer);

/* ---- Type 4: capital letter hunt ---- */
function renderCapital(q, c) {
  let chips = '';
  q.words.forEach((w, i) => {
    const isTarget = q.targets.includes(i);
    const isPunct = /^[.!?]$/.test(w);
    chips += `<div class="chip ${isTarget ? 'target' : 'static'}" id="chip${i}" data-word="${w}">${isPunct ? w : w}</div>`;
  });
  c.innerHTML = `<div class="card"><div class="word-chips">${chips}</div></div>`;
  q._done = new Set();
  q.words.forEach((w, i) => {
    if (q.targets.includes(i)) {
      const el = document.getElementById(`chip${i}`);
      el.onclick = () => tapCapital(q, i, el);
    } else {
      document.getElementById(`chip${i}`).style.cursor = 'default';
    }
  });
}
function capitalize(w) {
  return w.charAt(0).toUpperCase() + w.slice(1);
}
function tapCapital(q, i, el) {
  if (el.classList.contains('done')) return;
  el.classList.add('done');
  el.textContent = capitalize(q.words[i]);
  q._done.add(i);
  if (q._done.size === q.targets.length) {
    handleResult(true, null, q.fact);
  }
}

/* ---- Analog clock SVG generator ---- */
function makeClockSVG(hour, minute) {
  const r = 88, cx = 100, cy = 100;
  const minRad = (minute / 60) * 2 * Math.PI;
  const hrRad  = ((hour % 12 + minute / 60) / 12) * 2 * Math.PI;
  function pt(a, len) { return [+(cx + len * Math.sin(a)).toFixed(2), +(cy - len * Math.cos(a)).toFixed(2)]; }
  let ticks = '';
  for (let i = 0; i < 60; i++) {
    const a = (i / 60) * 2 * Math.PI;
    const isHour = i % 5 === 0;
    const [x1, y1] = pt(a, isHour ? r * 0.78 : r * 0.88);
    const [x2, y2] = pt(a, r);
    ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${isHour ? '#8B6914' : '#C4A030'}" stroke-width="${isHour ? 2.5 : 1.2}" stroke-linecap="round"/>`;
  }
  let nums = '';
  for (let i = 1; i <= 12; i++) {
    const a = (i / 12) * 2 * Math.PI;
    const [nx, ny] = pt(a, r * 0.64);
    nums += `<text x="${nx}" y="${ny}" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="900" font-family="Arial,sans-serif" fill="#5A4632">${i}</text>`;
  }
  const [mx, my] = pt(minRad, r * 0.80);
  const [hx, hy] = pt(hrRad,  r * 0.52);
  return `<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#FFFBF0" stroke="#B5780C" stroke-width="5"/><circle cx="${cx}" cy="${cy}" r="${r - 5}" fill="none" stroke="#FFE08A" stroke-width="1.5"/>${ticks}${nums}<line x1="${cx}" y1="${cy}" x2="${hx}" y2="${hy}" stroke="#3a2a00" stroke-width="7" stroke-linecap="round"/><line x1="${cx}" y1="${cy}" x2="${mx}" y2="${my}" stroke="#B5780C" stroke-width="4.5" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="6" fill="#3a2a00"/><circle cx="${cx}" cy="${cy}" r="2.5" fill="#FFC857"/></svg>`;
}

/* ---- Type dayorder: drag the days into the correct order ---- */
function renderDayOrder(q, c) {
  wrongCount = 0;
  const placed = {}; // day → slot index
  let dragDay = null;
  const bankOrder = [...q.days].sort(() => Math.random() - 0.5);
  const ordinals = ['1st','2nd','3rd','4th','5th','6th','7th'];

  function rebuild() {
    c.innerHTML = '';

    const bank = document.createElement('div');
    bank.className = 'day-chip-bank';
    const remaining = bankOrder.filter(d => placed[d] === undefined);
    if (remaining.length === 0) {
      bank.innerHTML = '<div class="noun-bank-empty">All in order! 🎉</div>';
    } else {
      remaining.forEach(d => {
        const chip = document.createElement('div');
        chip.className = 'day-chip';
        chip.draggable = true;
        chip.textContent = d;
        chip.addEventListener('dragstart', e => {
          dragDay = d;
          setTimeout(() => chip.classList.add('dragging'), 0);
          e.dataTransfer.effectAllowed = 'move';
        });
        chip.addEventListener('dragend', () => {
          chip.classList.remove('dragging');
          dragDay = null;
        });
        bank.appendChild(chip);
      });
    }
    c.appendChild(bank);

    const slotsWrap = document.createElement('div');
    slotsWrap.className = 'day-slots';

    q.days.forEach((correctDay, i) => {
      const placedDay = Object.keys(placed).find(d => placed[d] === i);
      const slot = document.createElement('div');
      slot.className = 'day-slot' + (placedDay ? ' slot-done' : '');
      slot.innerHTML = `<div class="day-slot-num">${ordinals[i]}</div>` +
        (placedDay ? `<div class="day-chip-placed">${placedDay}</div>` : '');

      slot.addEventListener('dragover', e => {
        e.preventDefault();
        if (!placedDay) slot.classList.add('drag-over');
      });
      slot.addEventListener('dragleave', e => {
        if (!slot.contains(e.relatedTarget)) slot.classList.remove('drag-over');
      });
      slot.addEventListener('drop', e => {
        e.preventDefault();
        slot.classList.remove('drag-over');
        if (!dragDay || placedDay) return;

        if (dragDay === correctDay) {
          placed[dragDay] = i;
          dragDay = null;
          rebuild();
          if (Object.keys(placed).length === q.days.length) {
            playPraise();
            const fb = document.getElementById('feedback');
            fb.textContent = 'Amazing! All 7 days in order! 🎉';
            fb.className = 'feedback good';
            const { ex, nextEx } = getExerciseBounds();
            const onNext = nextEx ? advance : levelComplete;
            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'Next ➜';
            nextBtn.style.cssText = `display:block;margin:16px auto 0;background:#FFC857;border:4px solid #B5780C;border-radius:18px;padding:14px 36px;font-size:22px;font-weight:bold;color:#6b4a14;cursor:pointer;box-shadow:0 4px 0 #B5780C;font-family:inherit;`;
            nextBtn.onclick = () => finishExercise(ex?.label || 'Exercise 1', q.days.length, onNext);
            document.getElementById('qcontainer').appendChild(nextBtn);
          }
        } else {
          wrongCount++;
          playWrong();
          const fb = document.getElementById('feedback');
          fb.textContent = 'Not quite that day — try another spot! 🌱';
          fb.className = 'feedback try';
          slot.style.animation = 'wobble 0.4s';
          setTimeout(() => { slot.style.animation = ''; }, 400);
          dragDay = null;
        }
      });

      slotsWrap.appendChild(slot);
    });

    c.appendChild(slotsWrap);
  }

  rebuild();
}

  wrongCount = 0;
  let qi = 0;

    c.innerHTML = '';
    const item = q.words[qi];
    const total = q.words.length;

    const prog = document.createElement('div');

    for (let i = 0; i < total; i++) {
      const dot = document.createElement('div');

      prog.appendChild(dot);
    }
    c.appendChild(prog);

    const target = item.word.toUpperCase();
    const letters = item.scrambled.split('');
    const placedIdx = [];

    const slotsWrap = document.createElement('div');
    slotsWrap.className = 'jumble-slots';
    for (let i = 0; i < target.length; i++) {
      const slot = document.createElement('div');
      slot.className = 'jumble-slot';
      slotsWrap.appendChild(slot);
    }

      tile.onclick = () => {
        const nextIdx = placedIdx.length;
        if (ltr.toUpperCase() === target[nextIdx]) {
          tile.classList.add('used');

          const slotEl = slotsWrap.children[nextIdx];

          if (placedIdx.length === target.length) {

/* ---- shared result handler ---- */
function handleResult(correct, btnEl, fact, onCorrect) {
  const fb = document.getElementById('feedback');
  if (correct) {
    playPraise();
    if (btnEl) btnEl.classList.add('correct');
    fb.textContent = randomPraise();
    fb.className = 'feedback good';
    showFact(fact);
    if (onCorrect) onCorrect();

    const lvl = LEVELS[currentLevel];
    const { ex, end, total, nextEx } = getExerciseBounds();
    const isLastQ = currentIdx >= end;

    if (isLastQ && lvl.exercises) {
      // Show Next button → result screen with scoring
      const exLabel = ex?.label || 'Exercise';
      const onNext = nextEx ? advance : levelComplete;
      const nextBtn = document.createElement('button');
      nextBtn.textContent = 'Next ➜';
      nextBtn.style.cssText = `display:block;margin:16px auto 0;background:#FFC857;border:4px solid #B5780C;border-radius:18px;padding:14px 36px;font-size:22px;font-weight:bold;color:#6b4a14;cursor:pointer;box-shadow:0 4px 0 #B5780C;font-family:inherit;`;
      nextBtn.onclick = () => finishExercise(exLabel, total, onNext);
      document.getElementById('qcontainer').appendChild(nextBtn);
    } else {
      setTimeout(advance, 1600);
    }
  } else {
    playWrong();
    if (btnEl) {
      btnEl.classList.add('wrong');
      setTimeout(() => btnEl.classList.remove('wrong'), 400);
    }
    fb.textContent = 'Almost! Try again 🌱';
    fb.className = 'feedback try';
  }
}

function advance() {
  currentIdx++;
  const data = LEVELS[currentLevel].data;
  if (currentIdx >= data.length) {
    levelComplete();
  } else {
    renderQuestion();
  }
}

function levelComplete() {
  if (!completed.includes(currentLevel)) {
    completed.push(currentLevel);
    try { localStorage.setItem('wv_unit1_completed', JSON.stringify(completed)); } catch(e) {}
  }
  if (completed.length >= LEVELS.length) {
    document.getElementById('view-level').classList.remove('active');
    document.getElementById('view-chapterend').classList.add('active');
  } else if (currentLevel + 1 < LEVELS.length) {
    startLevel(currentLevel + 1);
  } else {
    showMap();
  }
}

/* =========================================================
   SCORING
   ========================================================= */
let exerciseScores = [];
let wrongCount = 0;

function showResultScreen(label, correct, total, onNext) {
  document.getElementById('view-level').classList.remove('active');
  document.getElementById('view-result').classList.add('active');

  // Score on trophy
  document.getElementById('trophyScore').textContent = `${correct}/${total}`;

  // Score breakdown box
  const cumCorrect = exerciseScores.reduce((s, e) => s + e.correct, 0);
  const cumTotal   = exerciseScores.reduce((s, e) => s + e.total,   0);
  const rows = exerciseScores.map(e =>
    `<div class="rscore-line">${e.label}: <strong>${e.correct} / ${e.total}</strong></div>`
  ).join('');
  document.getElementById('resultScoreBox').innerHTML =
    rows + `<div class="rscore-total">Total: ${cumCorrect} / ${cumTotal}</div>`;

  // Next button
  document.getElementById('resultNextBtn').onclick = () => {
    document.getElementById('view-result').classList.remove('active');
    document.getElementById('view-level').classList.add('active');
    onNext();
  };
}

function finishExercise(label, total, onNext) {
  const correct = total; // full marks — player always gets it right eventually
  exerciseScores.push({ label, correct, total });
  showResultScreen(label, correct, total, onNext);
}

/* =========================================================
   AUDIO
   ========================================================= */
let audioCtx = null;
let masterGain = null;
let musicPlaying = true;
let musicLoopTimer = null;
let loopGeneration = 0; // increment on stop to cancel stale loops

function getCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// --- Twinkle Twinkle melody (C major, gentle) ---
const NOTE = { C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392.00,A4:440.00,B4:493.88,
               C5:523.25,D5:587.33,E5:659.25,G5:783.99 };
const MELODY = [
  ['C4',.38],['C4',.38],['G4',.38],['G4',.38],['A4',.38],['A4',.38],['G4',.76],
  ['F4',.38],['F4',.38],['E4',.38],['E4',.38],['D4',.38],['D4',.38],['C4',.76],
  ['G4',.38],['G4',.38],['F4',.38],['F4',.38],['E4',.38],['E4',.38],['D4',.76],
  ['G4',.38],['G4',.38],['F4',.38],['F4',.38],['E4',.38],['E4',.38],['D4',.76],
  ['C4',.38],['C4',.38],['G4',.38],['G4',.38],['A4',.38],['A4',.38],['G4',.76],
  ['F4',.38],['F4',.38],['E4',.38],['E4',.38],['D4',.38],['D4',.38],['C4',.76],
  [null,.5]
];

function playTone(freq, start, dur, vol=0.10, type='triangle') {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(masterGain); // route through master gain so mute works instantly
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, start);
  gain.gain.linearRampToValueAtTime(vol, start + 0.03);
  gain.gain.exponentialRampToValueAtTime(0.001, start + dur - 0.04);
  osc.start(start); osc.stop(start + dur);
}

function scheduleMelody(gen) {
  if (!musicPlaying || gen !== loopGeneration) return; // stale loop — bail out
  const ctx = getCtx();
  let t = ctx.currentTime + 0.05;
  let total = 0;
  MELODY.forEach(([note, dur]) => {
    if (note) playTone(NOTE[note], t, dur * 0.85);
    t += dur;
    total += dur;
  });
  musicLoopTimer = setTimeout(() => scheduleMelody(gen), (total - 0.1) * 1000);
}

function toggleMusic() {
  musicPlaying = !musicPlaying;
  document.getElementById('musicBtn').textContent = musicPlaying ? '🎵' : '🔇';
  if (musicPlaying) {
    masterGain.gain.setValueAtTime(1, getCtx().currentTime);
    loopGeneration++;
    scheduleMelody(loopGeneration);
  } else {
    loopGeneration++; // invalidates any running loop
    clearTimeout(musicLoopTimer);
    masterGain.gain.setValueAtTime(0, getCtx().currentTime); // silence immediately
  }
}

// Start music on first interaction
let audioStarted = false;
document.addEventListener('click', () => {
  if (!audioStarted) {
    audioStarted = true;
    if (musicPlaying) { loopGeneration++; scheduleMelody(loopGeneration); }
  }
}, { once: true });

// --- Praise sounds + speech ---
const PRAISES = ['Great job! 🎉','Wonderful! ⭐','Amazing! 🌟','You got it! 🎊','Brilliant! 💫','Super! 🌈'];
function randomPraise() { return PRAISES[Math.floor(Math.random() * PRAISES.length)]; }

function playPraise() {
  const ctx = getCtx();
  const now = ctx.currentTime;
  // Ascending chime: C E G C5
  [[523.25,0],[659.25,0.12],[783.99,0.24],[1046.5,0.36]].forEach(([f,d]) => {
    playTone(f, now+d, 0.45, 0.22, 'sine');
  });
  // Spoken praise
  if ('speechSynthesis' in window) {
    const words = ['Great job!','Wonderful!','You rock!','Brilliant!','Amazing!'];
    const u = new SpeechSynthesisUtterance(words[Math.floor(Math.random()*words.length)]);
    u.pitch = 1.4; u.rate = 0.95; u.volume = 1;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
  }
}

function speakWordSupported() {
  return 'speechSynthesis' in window;
}

function speakWord(word) {
  if (!speakWordSupported()) return;
  const u = new SpeechSynthesisUtterance(word);
  u.pitch = 1.1; u.rate = 0.75; u.volume = 1;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function playWrong() {
  const ctx = getCtx();
  playTone(220, ctx.currentTime, 0.18, 0.08, 'sine');
}
